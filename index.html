<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --serif: 'Playfair Display', Georgia, serif;
    --body: 'Source Serif 4', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
    --ink: var(--color-text-primary, #1a1a1a);
    --ink2: var(--color-text-secondary, #4a4a4a);
    --ink3: var(--color-text-tertiary, #888);
    --bg: var(--color-background-primary, #fff);
    --bg2: var(--color-background-secondary, #f8f7f4);
    --bg3: var(--color-background-tertiary, #f0ede8);
    --border: var(--color-border-tertiary, #e0dbd2);
    --border2: var(--color-border-secondary, #c8c2b8);
    --accent: #185FA5;
    --accent-light: #E6F1FB;
    --gold: #BA7517;
    --gold-light: #FAEEDA;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
  }

  body { font-family: var(--body); color: var(--ink); line-height: 1.75; font-size: 16px; background: var(--bg); }

  .wrapper { max-width: 860px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  .cover {
    border-bottom: 0.5px solid var(--border2);
    padding: 3rem 0 2.5rem;
    margin-bottom: 3rem;
  }
  .cover-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }
  .cover-title {
    font-family: var(--serif);
    font-size: 2.6rem;
    font-weight: 600;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }
  .cover-subtitle {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink2);
    margin-bottom: 2rem;
  }
  .cover-meta {
    display: flex; gap: 2rem; flex-wrap: wrap;
    font-size: 13px; color: var(--ink2);
    border-top: 0.5px solid var(--border);
    padding-top: 1.2rem;
  }
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-gold { background: var(--gold-light); color: var(--gold); }
  .badge-teal { background: var(--teal-light); color: var(--teal); }
  .badge-coral { background: var(--coral-light); color: var(--coral); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }

  .toc { margin-bottom: 3.5rem; }
  .toc-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1rem;
  }
  .toc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
  }
  .toc-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    font-family: var(--body);
  }
  .toc-item:hover { border-color: var(--border2); background: var(--bg2); }
  .toc-item.active { border-color: var(--accent); background: var(--accent-light); }
  .toc-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .toc-item.active .toc-num { color: var(--accent); }
  .toc-label { font-size: 13px; color: var(--ink); line-height: 1.4; }
  .toc-item.active .toc-label { color: var(--accent); }

  .module { display: none; }
  .module.active { display: block; }

  .module-header {
    border-bottom: 0.5px solid var(--border2);
    padding-bottom: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .module-num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.5rem;
  }
  .module-title {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .module-desc {
    font-size: 15px;
    color: var(--ink2);
    font-style: italic;
    font-family: var(--serif);
  }

  .chapter-title {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--ink);
    margin: 2.5rem 0 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 0.5px solid var(--border);
  }
  .section-title {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin: 1.8rem 0 0.6rem;
  }
  p { margin-bottom: 1rem; font-size: 15px; }
  p:last-child { margin-bottom: 0; }

  .callout {
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    padding: 1rem 1.2rem;
    border-radius: 0 6px 6px 0;
    margin: 1.5rem 0;
  }
  .callout-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .callout p { font-size: 14px; color: var(--ink); margin: 0; }
  .callout-gold { border-left-color: var(--gold); background: var(--gold-light); }
  .callout-gold .callout-label { color: var(--gold); }
  .callout-teal { border-left-color: var(--teal); background: var(--teal-light); }
  .callout-teal .callout-label { color: var(--teal); }
  .callout-coral { border-left-color: var(--coral); background: var(--coral-light); }
  .callout-coral .callout-label { color: var(--coral); }
  .callout-purple { border-left-color: var(--purple); background: var(--purple-light); }
  .callout-purple .callout-label { color: var(--purple); }

  .framework-box {
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 1.2rem 1.5rem;
    margin: 1.5rem 0;
    background: var(--bg2);
  }
  .framework-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 0.8rem;
  }
  .framework-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 0.5rem;
  }
  .framework-cell {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 0.7rem 0.8rem;
    font-size: 13px;
  }
  .framework-cell strong {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 3px;
    font-weight: 400;
  }

  .example-block {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    margin: 1.2rem 0;
    font-size: 14px;
    font-style: italic;
    color: var(--ink2);
  }
  .example-block em { color: var(--ink); font-style: normal; font-weight: 500; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin: 1.2rem 0;
  }
  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    padding: 8px 10px;
    border-bottom: 0.5px solid var(--border2);
    text-align: left;
    font-weight: 400;
  }
  td {
    padding: 8px 10px;
    border-bottom: 0.5px solid var(--border);
    vertical-align: top;
    color: var(--ink);
    line-height: 1.5;
  }
  tr:last-child td { border-bottom: none; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
  }
  .nav-btn {
    font-family: var(--body);
    font-size: 13px;
    color: var(--ink2);
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--bg2); color: var(--ink); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .back-toc {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px 0;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: all 0.15s;
  }
  .back-toc:hover { color: var(--ink2); text-decoration-color: var(--ink3); }

  .progress-bar { display: flex; gap: 3px; margin-bottom: 2rem; }
  .progress-seg { height: 3px; flex: 1; background: var(--border2); border-radius: 2px; transition: background 0.3s; }
  .progress-seg.done { background: var(--accent); }

  .glossary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
    margin: 1.2rem 0;
  }
  .glossary-item {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    font-size: 13.5px;
  }
  .glossary-term {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  ul.content-list { padding-left: 1.4rem; margin: 0.8rem 0 1rem; }
  ul.content-list li { font-size: 15px; margin-bottom: 0.5rem; }
  ul.content-list li strong { color: var(--ink); }
</style>
</head>
<body>
<div class="wrapper">
  <div id="cover-toc">
    <div class="cover">
      <div class="cover-eyebrow">Tài Liệu Giáo Dục · Tranh Luận Cạnh Tranh</div>
      <div class="cover-title">Nền Tảng Tranh Luận<br>trong Kỷ Nguyên Trí Tuệ Nhân Tạo</div>
      <div class="cover-subtitle">Chương Trình Giảng Dạy Toàn Diện Dành Cho Người Mới Tham Dự Thi</div>
      <div class="cover-meta">
        <span><span class="badge badge-blue">8 Mô-đun</span></span>
        <span><span class="badge badge-gold">Giáo Trình Đầy Đủ</span></span>
        <span><span class="badge badge-teal">Người Mới → Thi Đấu</span></span>
        <span><span class="badge badge-purple">Đạo Đức AI · Chính Sách · Công Nghệ</span></span>
      </div>
    </div>
    <div class="toc">
      <div class="toc-title">Mục Lục</div>
      <div class="toc-grid" id="toc-grid"></div>
    </div>
  </div>
  <div id="modules-container"></div>
</div>

<script>
const modules = [
  {
    num: "Mô-đun I",
    title: "Triết Học và Kiến Trúc Lập Luận",
    desc: "Nền tảng bản thể luận, gánh nặng chứng minh, logic hình thức, cấu trúc bài, quyền tạo chính sách và khung lập luận.",
    badge: "badge-blue",
    content: `
      <div class="chapter-title">1.1 Bản Thể Luận của Tranh Luận (Ontology of Debate)</div>
      <p>Tranh luận cạnh tranh không chỉ là hoạt động trình bày ý kiến. Về bản chất, nó là một hệ thống nhận thức luận có cấu trúc — một phương thức kiểm tra tính hợp lý của các lập luận thông qua đối thoại đối kháng có kiểm soát. Trước khi học bất kỳ kỹ thuật cụ thể nào, người học cần nắm triết lý nền tảng của bộ môn này: tranh luận giả định rằng sự thật và chính sách tốt không thể được xác định bởi một cá nhân đơn lẻ, mà phải được kiểm định qua quá trình phản biện có hệ thống.</p>
      <p>Mô hình này kế thừa phương pháp Socratic — dùng phản bác để lọc bỏ lập luận yếu và giữ lại lập luận có sức mạnh. Trong môi trường thi đấu, ban giám khảo đóng vai trò "công chúng lý trí" (reasonable audience): người ra quyết định dựa trên lập luận thuyết phục nhất, không phải quan điểm cá nhân của họ về vấn đề được tranh luận. Đây là sự khác biệt căn bản so với phát biểu ý kiến thông thường — nhiệm vụ của người tranh luận là thực thi nghĩa vụ lập luận (argumentative obligation), không phải thể hiện niềm tin cá nhân.</p>
      <div class="callout">
        <div class="callout-label">Nguyên Tắc Nền Tảng</div>
        <p>Trong tranh luận cạnh tranh, bạn có thể được yêu cầu bảo vệ lập trường mà bạn không đồng ý. Khả năng lập luận cho cả hai phía của một vấn đề không phải là sự thiếu trung thực — đây là dấu hiệu của tư duy phản biện trưởng thành và khả năng hiểu đầy đủ một vấn đề phức tạp.</p>
      </div>

      <div class="section-title">Vai Trò của Nghị Đề (Motion)</div>
      <p>Mọi cuộc tranh luận bắt đầu bằng một <strong>nghị đề</strong> — một tuyên bố chính sách hoặc quan điểm cụ thể mà các đội bảo vệ hoặc phản đối. Nghị đề không chỉ là chủ đề chung chung; nó xác định chính xác phạm vi tranh luận và giới hạn những lập luận nào là phù hợp. Ví dụ: <em>"Hội đồng này tin rằng các chính phủ dân chủ nên áp đặt lệnh tạm hoãn phát triển các mô hình AI có năng lực vượt GPT-4."</em> Nghị đề này xác định rõ: chủ thể hành động (chính phủ dân chủ), hành động (tạm hoãn), và đối tượng (mô hình AI frontier). Các lập luận về AI nói chung, hay về chính sách của các chính phủ phi dân chủ, đều nằm ngoài phạm vi nghị đề này.</p>
      <p>Nghị đề thường có ba dạng chính: <strong>Nghị đề chính sách</strong> (Policy motions) yêu cầu đề xuất hoặc phản đối một hành động cụ thể; <strong>Nghị đề giá trị</strong> (Value motions) đánh giá một giá trị hoặc nguyên tắc; và <strong>Nghị đề thực tế</strong> (Fact motions) tranh luận về việc một điều gì đó có đúng hay không. Phần lớn nghị đề AI trong các cuộc thi quốc tế là nghị đề chính sách.</p>

      <div class="chapter-title">1.2 Gánh Nặng Chứng Minh (Burden of Proof)</div>
      <p>Gánh nặng chứng minh là nghĩa vụ của một bên phải cung cấp đủ lập luận và bằng chứng để hỗ trợ tuyên bố của mình. Trong hầu hết các thể thức tranh luận, <strong>bên Chính phủ (Government/Proposition)</strong> mang gánh nặng chứng minh chính — họ phải chứng minh nghị đề tốt hơn hiện trạng. Nếu bên Chính phủ không hoàn thành gánh nặng này, bên Đối lập không cần chứng minh bất kỳ điều gì khác — chỉ cần cho thấy Chính phủ đã thất bại là đủ.</p>
      <div class="framework-box">
        <div class="framework-title">Phân Loại Gánh Nặng Chứng Minh</div>
        <div class="framework-row">
          <div class="framework-cell"><strong>Burden of Proof</strong>Nghĩa vụ cung cấp lập luận và bằng chứng hỗ trợ tuyên bố ban đầu. Bên Chính phủ luôn mang gánh nặng này đầu tiên.</div>
          <div class="framework-cell"><strong>Burden of Rebuttal</strong>Nghĩa vụ phản biện lập luận đối lập sau khi đã được đưa ra. Nếu đối thủ đưa ra bằng chứng mạnh và bạn im lặng, bạn mặc nhiên nhượng bộ điểm đó.</div>
          <div class="framework-cell"><strong>Burden of Rejoinder</strong>Nghĩa vụ phản hồi lại phản biện của đối thủ đối với lập luận ban đầu của bạn. Cuộc tranh luận là chuỗi trao đổi liên tục, không phải hai bài độc lập.</div>
          <div class="framework-cell"><strong>Presumption</strong>Trong trường hợp hai bên hòa đồng đều, ban giám khảo thường ủng hộ bên Đối lập vì "hiện trạng" (status quo) được mặc định là tốt hơn nếu Chính phủ không chứng minh được sự cần thiết phải thay đổi.</div>
        </div>
      </div>
      <p>Nguyên tắc nền tảng: <em>Người đưa ra tuyên bố phải chứng minh tuyên bố đó</em>. Nếu bạn nói "AI sẽ thay thế 40% lực lượng lao động trong 10 năm tới," bạn phải cung cấp bằng chứng — đối thủ không có nghĩa vụ chứng minh điều ngược lại cho đến khi bạn hoàn thành nghĩa vụ của mình trước.</p>

      <div class="chapter-title">1.3 Logic Hình Thức và Các Loại Lập Luận</div>
      <p>Logic hình thức là nền tảng của mọi lập luận tốt. Người tranh luận cần thành thạo hai cấu trúc chính:</p>
      <div class="section-title">Diễn Dịch (Deductive Reasoning)</div>
      <p>Lập luận diễn dịch đi từ tiền đề chung đến kết luận cụ thể. Nếu tiền đề đúng và cấu trúc logic hợp lệ, kết luận tất yếu phải đúng — không có ngoại lệ. Dạng chuẩn là tam đoạn luận (syllogism): <em>Tiền đề 1 (P1): Mọi hệ thống có thể tối ưu hóa sai mục tiêu đều gây rủi ro khi được trao quyền lực lớn. Tiền đề 2 (P2): Các mô hình AI language lớn hiện tại có thể tối ưu hóa sai mục tiêu (reward hacking). Kết luận (C): Các mô hình AI language lớn gây rủi ro khi được trao quyền lực lớn.</em></p>
      <p>Khi tấn công một lập luận diễn dịch, bạn có hai hướng: (1) chứng minh một tiền đề sai, hoặc (2) chứng minh cấu trúc logic không hợp lệ ngay cả khi tiền đề đúng. Lỗi thứ hai gọi là <em>non sequitur</em> — kết luận không theo sau tiền đề.</p>
      <div class="section-title">Quy Nạp (Inductive Reasoning)</div>

      <p><strong>DeepMind và Google:</strong> Google mua lại DeepMind năm 2014 với cam kết về sứ mệnh an toàn AI độc lập. Căng thẳng về quyền tự chủ nghiên cứu vs. mục tiêu thương mại của Google đã được ghi nhận qua nhiều năm, bao gồm việc giải tán Hội đồng Đạo đức AI của Google năm 2019 chỉ một tuần sau khi thành lập do phản ứng về thành phần hội đồng.</p>
      <div class="section-title">Khả Năng Biến Đổi Tích Cực</div>
      <p><strong>AlphaFold (DeepMind, 2020–2021):</strong> Mô hình AI của Google DeepMind đã giải quyết bài toán protein folding tồn tại 50 năm — dự đoán cấu trúc 3D của protein từ chuỗi amino acid. Đây được mô tả là một trong những bước đột phá khoa học lớn nhất trong thập kỷ. AlphaFold 2 (2021) và cơ sở dữ liệu cấu trúc protein miễn phí với hơn 200 triệu protein đã thúc đẩy nghiên cứu phát triển thuốc, sinh học tổng hợp, và hiểu biết về bệnh tật. Đây là bằng chứng mạnh nhất cho tiềm năng tích cực của AI trong khoa học.</p>
      <p><strong>AI trong Chẩn Đoán Y Tế:</strong> Các mô hình AI đã cho thấy độ chính xác tương đương hoặc vượt bác sĩ chuyên khoa trong một số lĩnh vực cụ thể: phát hiện ung thư vú từ ảnh chụp nhũ ảnh (Google Health), phân loại ung thư da (Stanford), phát hiện bệnh võng mạc đái tháo đường (IDx-DR — thiết bị AI y tế đầu tiên được FDA phê duyệt tự chủ, 2018). Điều quan trọng: hiệu suất tốt trong điều kiện nghiên cứu không tự động chuyển sang thực hành lâm sàng thực tế — một lưu ý quan trọng để tránh overhype.</p>

      <div class="chapter-title">8.4 Chuẩn Mực Kỹ Thuật và Điểm Chuẩn (Technical Benchmarks)</div>
      <p>Hiểu biết về các điểm chuẩn kỹ thuật giúp người tranh luận tránh các tuyên bố không chính xác về khả năng AI và xây dựng lập luận dựa trên thực tế kỹ thuật — không phải khoa học viễn tưởng hay quá lạc quan/bi quan.</p>
      <div class="glossary-grid">
        <div class="glossary-item"><div class="glossary-term">MMLU Benchmark</div>Massive Multitask Language Understanding — đánh giá kiến thức đa ngành (từ luật đến y học đến toán học). GPT-4 đạt ~87%, Claude 3 Opus đạt ~86%, vượt trung bình con người trong nhiều lĩnh vực. Tuy nhiên: điểm MMLU cao không đồng nghĩa với "thông minh" toàn diện — mô hình có thể đạt điểm cao mà vẫn thiếu khả năng suy luận thực sự.</div>
        <div class="glossary-item"><div class="glossary-term">Frontier AI</div>Thuật ngữ chỉ các mô hình AI mạnh nhất đang tồn tại — cạnh tiên phong của năng lực AI. EU AI Act và các khung quản trị tập trung đặc biệt vào frontier AI vì chúng có ngưỡng rủi ro cao nhất. Ranh giới "frontier" thay đổi nhanh chóng.</div>
        <div class="glossary-item"><div class="glossary-term">Compute Threshold</div>Mức tính toán (FLOPs) được dùng làm proxy cho "AI rủi ro cao" trong quy định. EU AI Act và đề xuất Mỹ sử dụng ngưỡng 10^25 FLOPs (cho training). Ưu điểm: dễ đo lường. Hạn chế: không phản ánh mức độ nguy hiểm thực sự — một mô hình nhỏ có thể nguy hiểm hơn mô hình lớn trong bối cảnh cụ thể.</div>
        <div class="glossary-item"><div class="glossary-term">Emergent Capabilities</div>Khả năng xuất hiện đột ngột ở một quy mô nhất định mà không được dự đoán từ mô hình nhỏ hơn. Đây là vấn đề an toàn quan trọng: chúng ta không thể kiểm tra đầy đủ một mô hình nhỏ và ngoại suy về hành vi của mô hình lớn hơn.</div>
        <div class="glossary-item"><div class="glossary-term">Existential Risk (x-risk)</div>Rủi ro gây nguy hiểm cho sự tồn tại hoặc tiềm năng lâu dài của nền văn minh con người. Nhiều nhà nghiên cứu AI an toàn (Yoshua Bengio, Stuart Russell) coi AGI không được căn chỉnh là x-risk tiềm năng. Tranh luận về x-risk thường là tranh luận về xác suất và ngưỡng hành động trong điều kiện không chắc chắn.</div>
        <div class="glossary-item"><div class="glossary-term">Interpretability vs. Explainability</div>Interpretability (khả năng diễn giải): hiểu bên trong mô hình hoạt động như thế nào về mặt cơ học. Explainability (khả năng giải thích): cung cấp giải thích có ý nghĩa về quyết định cho người dùng không chuyên. Cả hai đều quan trọng nhưng cho các mục đích khác nhau trong tranh luận về AI transparency.</div>
        <div class="glossary-item"><div class="glossary-term">AI Safety vs. AI Ethics</div>AI Safety tập trung vào các rủi ro tiềm ẩn dài hạn và kỹ thuật (alignment, x-risk, emergent capabilities). AI Ethics tập trung vào thiên kiến, quyền riêng tư, công bằng, và tác hại hiện tại đang quan sát được. Hai lĩnh vực có phương pháp luận khác nhau và đôi khi có ưu tiên xung đột — cần phân biệt rõ khi sử dụng trong tranh luận.</div>
        <div class="glossary-item"><div class="glossary-term">Red Teaming</div>Phương pháp kiểm tra bảo mật AI: một nhóm người (red team) cố tình tìm cách làm hệ thống AI hoạt động sai — phát hiện jailbreaks, thiên kiến ẩn, và lỗ hổng bảo mật. Đây là yêu cầu trong EU AI Act cho các hệ thống rủi ro cao và là thực hành tiêu chuẩn của các lab AI hàng đầu.</div>
      </div>

      <div class="chapter-title">8.5 Xây Dựng Ngân Hàng Bằng Chứng Cá Nhân</div>
      <p>Người tranh luận cạnh tranh không thể nhớ mọi dữ liệu — nhưng cần có khả năng trích dẫn đúng các bằng chứng quan trọng nhất dưới áp lực. Phương pháp xây dựng ngân hàng bằng chứng hiệu quả:</p>
      <ul class="content-list">
        <li><strong>Tổ chức theo chủ đề:</strong> Tạo "thẻ bằng chứng" cho mỗi chủ đề AI chính (việc làm, thiên kiến, quản trị, an toàn, khả năng tích cực). Mỗi thẻ có: tuyên bố cụ thể + nguồn + năm + điểm giới hạn của bằng chứng đó.</li>
        <li><strong>Ưu tiên bằng chứng "all-purpose":</strong> Một số bằng chứng hữu ích trong nhiều bối cảnh khác nhau. Ví dụ: AlphaFold có thể được sử dụng cho tranh luận về tiềm năng tích cực, về AI và khoa học, về lợi ích không theo dự đoán của AI. Đây là những bằng chứng đáng học thuộc.</li>
        <li><strong>Cập nhật thường xuyên:</strong> AI phát triển rất nhanh — bằng chứng từ năm 2020 về "những gì AI có thể làm" có thể đã lỗi thời hoàn toàn. Dành 30 phút mỗi tuần để cập nhật ngân hàng bằng chứng từ các nguồn uy tín: Nature, Science, arXiv (AI safety), AI Now Institute, Future of Life Institute.</li>
        <li><strong>Luyện tập trích dẫn:</strong> Biết nguồn gốc không đủ — bạn cần có thể trích dẫn chúng một cách tự nhiên và chính xác dưới áp lực. Luyện tập nói to các bằng chứng quan trọng nhất cho đến khi trở nên tự nhiên.</li>
      </ul>
      <div class="callout callout-coral">
        <div class="callout-label">Lời Khuyên Cuối Cùng cho Người Mới</div>
        <p>Kiến thức kỹ thuật về AI là lợi thế cạnh tranh quan trọng — nhưng chỉ khi được dịch sang <strong>ngôn ngữ chính sách và đạo đức</strong> mà giám khảo có thể đánh giá. Người tranh luận giỏi nhất không chỉ biết công nghệ mà còn biết cách kết nối nó với câu hỏi căn bản: <em>Điều này có nghĩa gì đối với quyền, phúc lợi, và sự công bằng của những con người thực đang sống trong thế giới này?</em> Đó là cầu nối giữa kỹ thuật và nhân văn — và đó là nơi tranh luận AI tốt nhất diễn ra.</p>
      </div>
    `
  }
];

const tocGrid = document.getElementById('toc-grid');
const modulesContainer = document.getElementById('modules-container');
const coverToc = document.getElementById('cover-toc');

function buildTOC() {
  modules.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'toc-item';
    btn.id = `toc-${i}`;
    btn.innerHTML = `<span class="toc-num">${String(i+1).padStart(2,'0')}</span><span class="toc-label">${m.title}</span>`;
    btn.onclick = () => showModule(i);
    tocGrid.appendChild(btn);
  });
}

function buildModules() {
  modules.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'module';
    div.id = `module-${i}`;
    const progHTML = modules.map((_, j) =>
      `<div class="progress-seg${j <= i ? ' done' : ''}"></div>`
    ).join('');
    div.innerHTML = `
      <div class="progress-bar">${progHTML}</div>
      <div class="module-header">
        <div class="module-num">${m.num} · <span class="badge ${m.badge}">${['Triết Học','Xây Dựng','Phản Biện','Sàn Đấu','Hùng Biện','Nội Dung AI','Chuẩn Bị','Bằng Chứng'][i]}</span></div>
        <div class="module-title">${m.title}</div>
        <div class="module-desc">${m.desc}</div>
      </div>
      ${m.content}
      <div class="nav-row">
        <button class="nav-btn" onclick="prevModule(${i})" ${i === 0 ? 'disabled' : ''}>← Mô-đun trước</button>
        <button class="back-toc" onclick="showCover()">↑ Mục Lục</button>
        <button class="nav-btn" onclick="nextModule(${i})" ${i === modules.length - 1 ? 'disabled' : ''}>Mô-đun tiếp →</button>
      </div>
    `;
    modulesContainer.appendChild(div);
  });
}

function showCover() {
  coverToc.style.display = 'block';
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showModule(i) {
  coverToc.style.display = 'none';
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`module-${i}`).classList.add('active');
  document.getElementById(`toc-${i}`)?.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevModule(i) { if (i > 0) showModule(i - 1); }
function nextModule(i) { if (i < modules.length - 1) showModule(i + 1); }

buildTOC();
buildModules();
</script>
