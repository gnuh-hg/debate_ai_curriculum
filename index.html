      <div class="section-title">Phân Tích Clash</div>
      <ul class="content-list">
        <li><strong>Clash chính — Policy Design Clash (Mô-đun IV.2):</strong> Trận đấu xoay quanh việc liệu moratorium có phải là công cụ chính sách đúng đắn hay không. Cả hai bên đồng ý về vấn đề (AI frontier cần quản trị) nhưng bất đồng sâu sắc về giải pháp. Đây là clash cấu trúc nhất trong trận — và Đối lập đã làm tốt hơn ở chiều này bằng cách đề xuất alternative policy.</li>
        <li><strong>Clash thứ cấp — Factual/Empirical Clash:</strong> Tranh luận về khả năng tuân thủ của Trung Quốc, chi phí y tế của moratorium, và tính khả thi của hợp tác quốc tế. Cả hai bên đều có evidence cụ thể; Chính phủ mạnh hơn về evidence an toàn AI, Đối lập mạnh hơn về evidence địa chính trị.</li>
        <li><strong>Clash về Causal Mechanism:</strong> Chính phủ lập luận moratorium → an toàn hơn; Đối lập lập luận moratorium → race to the bottom → kém an toàn hơn. Đây là clash nhân quả quan trọng mà cả hai bên chưa giải quyết đầy đủ.</li>
      </ul>

      <div class="section-title">️ Đánh Giá: Bên Nào Mạnh Hơn?</div>
      <div class="callout">
        <div class="callout-label">Nhận Xét của Huấn Luyện Viên</div>
        <p><strong>Chính phủ thắng về magnitude và moral framing</strong>, nhưng <strong>Đối lập thắng về policy design và feasibility</strong>. Trong thực tế thi đấu, đây sẽ là một trận gần điểm — kết quả phụ thuộc vào cách judge weighs "speculative catastrophic risk" vs. "concrete immediate costs". Nếu judge ưu tiên precautionary principle: CP thắng. Nếu judge ưu tiên policy effectiveness: ĐL thắng. Điều này chứng minh tại sao framing bắt đầu từ PM Speech lại quan trọng đến vậy.</p>
      </div>

      <div class="section-title">Sai Lầm &amp; Cơ Hội Bị Bỏ Lỡ</div>

      <div class="example-block">
        <strong>Chính phủ — Hai sai lầm nghiêm trọng:</strong><br><br>
        <strong>Sai lầm 1:</strong> CP-3 không giải quyết vấn đề <em>ai quyết định</em> mô hình nào đã đạt "AGI threshold" — đây là lỗ hổng khai thác được mà Đối lập đã chỉ ra nhưng CP không phản hồi đầy đủ. <em>Cách sửa (Mô-đun II.1 — AREI):</em> Reasoning trong CP-3 cần bao gồm đề xuất cụ thể về cơ quan đánh giá — ví dụ "IAEA model for AI" với inspectors quốc tế được đào tạo kỹ thuật.<br><br>
        <strong>Sai lầm 2:</strong> Không có Impact Weighing trực tiếp đối chiếu với ĐL-2 về chi phí y tế. CP chỉ phủ nhận clash này bằng cách nói "ứng dụng hẹp vẫn tiếp tục" — nhưng không weighs trực tiếp "5–10% catastrophic risk trong 50 năm" với "5 triệu sinh mạng mỗi năm". <em>Cách sửa (Mô-đun III.4):</em> Cần discount factor về thời gian và xác suất: rủi ro AGI catastrophic xảy ra trong 50 năm với 7% xác suất ≠ impact tương đương với 5 triệu sinh mạng/năm.
      </div>

      <div class="example-block">
        <strong>Đối lập — Hai sai lầm nghiêm trọng:</strong><br><br>
        <strong>Sai lầm 1:</strong> ĐL-1 về Trung Quốc không giải quyết phản hồi của CP về đòn bẩy chip (TSMC/ASML). Đây là lỗ hổng lớn — nếu CP đúng rằng Trung Quốc không có khả năng huấn luyện frontier AGI mà không có chip phương Tây, thì toàn bộ lập luận ĐL-1 sụp đổ. <em>Cách sửa (Mô-đun III.1 — Phản biện tấn công Reasoning):</em> ĐL cần tranh luận rằng Trung Quốc đang phát triển chip nội địa (Huawei Ascend 910B) hoặc rằng khoảng cách sẽ thu hẹp trong thời hạn moratorium.<br><br>
        <strong>Sai lầm 2:</strong> ĐL-3 về alternative policy là lập luận mạnh nhất của ĐL nhưng lại được để đến cuối và thiếu evidence về tính hiệu quả. EU AI Act mới ban hành, chưa có track record. <em>Cách sửa (Mô-đun VIII — Evidence Quality):</em> Cần evidence mạnh hơn về tính hiệu quả của risk-based regulation — ví dụ từ lĩnh vực tài chính (Basel III vs. moratorium trên derivatives) hoặc ngành dược phẩm (FDA approval process vs. cấm nghiên cứu).
      </div>

      <div class="section-title">Bài Học Rút Ra — Trận 1</div>
      <div class="callout callout-gold">
        <div class="callout-label">Bài Học Cho Người Tranh Luận</div>
        <ul class="content-list">
          <li><strong>Bài học 1 — Định nghĩa phải kín:</strong> CP đã định nghĩa "AGI-capable" nhưng không làm rõ cơ chế xác định — tạo ra lỗ hổng cho ĐL khai thác. Mỗi định nghĩa chiến lược phải đi kèm với <em>tiêu chí đo lường cụ thể</em> (Mô-đun VII.2).</li>
          <li><strong>Bài học 2 — Impact Weighing phải trực tiếp:</strong> Không đủ khi chỉ nêu impact của mình — phải đặt impact của mình trong tương quan trực tiếp với impact của đối phương và giải thích tại sao của mình lớn hơn (Mô-đun III.4).</li>
          <li><strong>Bài học 3 — Alternative Policy là vũ khí của ĐL:</strong> Đối lập mạnh nhất khi không chỉ nói "không" mà đề xuất "cái này tốt hơn". Nhưng alternative phải có evidence về tính hiệu quả, không chỉ về tính hấp dẫn về mặt lý thuyết (Mô-đun II.2 — Reasoning).</li>
          <li><strong>Bài học 4 — Judo POI:</strong> Phản hồi POI xuất sắc nhất không phải là phòng thủ mà là phản công — biến question của đối thủ thành evidence cho case của mình (Mô-đun IV.3).</li>
        </ul>
      </div>

      <!-- ==================== TRẬN ĐẤU 2 ==================== -->

      <div class="section-title">️ Trận Đấu 2 — Công Bằng Thuật Toán &amp; Thị Trường Lao Động</div>

      <div class="chapter-title">Phần 2.A — Chuẩn Bị Trước Trận</div>

      <div class="framework-box">
        <div class="framework-row">
          <div class="framework-cell"><strong>Nghị đề (Motion)</strong></div>
          <div class="framework-cell">HĐNT nên cấm các doanh nghiệp sử dụng hệ thống AI trong sàng lọc và tuyển dụng lao động.</div>
        </div>
        <div class="framework-row">
          <div class="framework-cell"><strong>Loại nghị đề</strong></div>
          <div class="framework-cell"><strong>Policy Motion — với Value Underpinning mạnh.</strong> Nghị đề yêu cầu hành động chính sách cụ thể (cấm) của chủ thể cụ thể (HĐNT) về hành vi cụ thể (sử dụng AI trong tuyển dụng). Tuy nhiên, core clash sẽ xoay quanh giá trị công bằng (fairness) vs. hiệu quả (efficiency) — làm cho nó là policy motion với value dimension quan trọng, đòi hỏi cả hai bên phải tranh luận cả về giá trị lẫn cơ chế chính sách.</div>
        </div>
        <div class="framework-row">
          <div class="framework-cell"><strong>Thể thức</strong></div>
          <div class="framework-cell">British Parliamentary (BP) — 4 đội, tập trung vào Prime Minister và Leader of Opposition speeches</div>
        </div>
      </div>

      <div class="section-title">Định Nghĩa Thuật Ngữ Then Chốt</div>
      <ul class="content-list">
        <li><strong>"Hệ thống AI trong sàng lọc và tuyển dụng":</strong> Bất kỳ phần mềm sử dụng machine learning để lọc hồ sơ (resume screening), xếp hạng ứng viên, phân tích video phỏng vấn (như HireVue), hoặc dự đoán hiệu suất công việc. Không bao gồm công cụ tìm kiếm đơn giản hoặc bộ lọc từ khóa cơ bản. <em>Ý nghĩa chiến lược:</em> Chính phủ muốn định nghĩa rộng để bao gồm mọi công cụ có bias tiềm năng; Đối lập muốn định nghĩa hẹp để bảo vệ các ứng dụng "tốt" của AI trong HR.</li>
        <li><strong>"Sàng lọc" (Screening):</strong> Bước loại bỏ ứng viên trước khi phỏng vấn — thường là bước mà bias gây hại lớn nhất vì loại bỏ cơ hội trước khi ứng viên có thể thể hiện bản thân. <em>Ý nghĩa chiến lược:</em> Phân biệt "screening" với "ranking" và "decision support" quan trọng — cấm screening có thể được chấp nhận ngay cả bởi những người ủng hộ AI trong HR.</li>
        <li><strong>"Cấm" (Ban):</strong> Prohibition pháp lý có chế tài hành chính/hình sự, không phải khuyến nghị tự nguyện. <em>Ý nghĩa chiến lược:</em> Đây là threshold cao — CP phải chứng minh không chỉ "AI tuyển dụng có vấn đề" mà "vấn đề nghiêm trọng đến mức cần prohibition, không phải regulation".</li>
      </ul>

      <div class="section-title">Gánh Nặng Chứng Minh</div>
      <div class="framework-box">
        <div class="framework-row">
          <div class="framework-cell"><strong>Chính phủ:</strong></div>
          <div class="framework-cell">(1) AI tuyển dụng tạo ra hoặc khuếch đại discrimination hệ thống đủ nghiêm trọng để biện minh cho prohibition; (2) Prohibition là biện pháp phù hợp hơn regulation; (3) Lợi ích của AI tuyển dụng không đủ để bù đắp tổn hại về công bằng.</div>
        </div>
        <div class="framework-row">
          <div class="framework-cell"><strong>Đối lập:</strong></div>
          <div class="framework-cell">(1) AI tuyển dụng, dù có khiếm khuyết, tốt hơn hoặc không tệ hơn tuyển dụng thuần con người; HOẶC (2) Regulation là đủ và phù hợp hơn prohibition; HOẶC (3) Prohibition sẽ gây hại nhiều hơn lợi cho chính những nhóm mà CP muốn bảo vệ.</div>
        </div>
      </div>

      <div class="section-title">Dự Báo Clash Points</div>
      <ul class="content-list">
        <li><strong>Clash 1 — So sánh cơ sở (Comparison baseline):</strong> AI tuyển dụng có bias vs. con người tuyển dụng cũng có bias — cái nào tệ hơn?</li>
        <li><strong>Clash 2 — Transparency và contestability:</strong> CP lập luận AI bias không thể nhìn thấy hoặc phản đối được; ĐL lập luận AI bias có thể audit được, trong khi bias của con người thì không.</li>
        <li><strong>Clash 3 — Tác động lên nhóm được bảo vệ:</strong> Prohibition có thể khiến công ty quay lại tuyển dụng con người có bias ngầm hơn — ai thực sự được bảo vệ?</li>
        <li><strong>Clash 4 — Scope và chilling effect:</strong> Liệu "cấm" có giết chết toàn bộ đổi mới HR tech hợp pháp không?</li>
      </ul>

      <div class="chapter-title">Phần 2.B — Bài Phát Biểu Các Bên</div>

      <div class="section-title">PM Speech — Chính Phủ (7 phút)</div>

      <div class="example-block">
        <strong>Lập Luận CP-1: AI tuyển dụng khuếch đại và hệ thống hóa discrimination một cách khoa học</strong><br><br>
        <strong>[A]</strong> Không giống bias của con người — vốn có tính ngẫu nhiên và có thể bị can thiệp — AI tuyển dụng mã hóa discrimination vào quy mô công nghiệp, áp dụng nhất quán với tốc độ và quy mô mà con người không thể đạt được, biến định kiến thành hệ thống.<br><br>
        <strong>[R]</strong> Cơ chế: Các mô hình AI được huấn luyện trên dữ liệu lịch sử tuyển dụng — nhưng dữ liệu lịch sử phản ánh thế giới có discrimination. Khi mô hình học từ "những người được thuê thành công trong quá khứ", nó học từ một tập hợp bị chọn lọc bởi các quyết định của con người có bias. Điều này không phải là bug mà là feature — mô hình đang làm chính xác những gì được yêu cầu. Hệ quả: discrimination trở nên scalable, consistent, và — nguy hiểm nhất — được phủ lên bởi hào quang của "khách quan, dựa trên dữ liệu."<br><br>
        <strong>[E]</strong> Bằng chứng kinh điển: Amazon đã phải hủy bỏ công cụ AI tuyển dụng nội bộ năm 2018 sau khi phát hiện nó systematically penalize hồ sơ có từ "phụ nữ" (Reuters, 2018). HireVue — phần mềm phân tích video phỏng vấn được 700+ công ty Fortune 500 sử dụng — bị EEOC điều tra vì potential bias với người khuyết tật (2021). Nghiên cứu của Raghavan et al. (2020, Cornell University) kiểm tra 8 công ty HR AI hàng đầu và phát hiện 100% có các hình thức disparate impact với ít nhất một nhóm được bảo vệ, và không công ty nào có thể giải thích đầy đủ cơ chế gây ra impact đó.<br><br>
        <strong>[I]</strong> <em>Magnitude:</em> Theo BLS, Mỹ có 150 triệu lao động; nếu 55% ứng dụng việc làm đi qua AI screening (LinkedIn data, 2023), khoảng 82 triệu người mỗi năm bị ảnh hưởng bởi hệ thống có disparate impact. <em>Irreversibility:</em> Nếu không được thuê ở bước screening, người lao động không bao giờ biết lý do và không có con đường phản đối. <em>Breadth:</em> Ảnh hưởng không chỉ thu nhập cá nhân mà còn toàn bộ quỹ đạo sự nghiệp và an sinh xã hội.
      </div>

      <div class="example-block">
        <strong>Lập Luận CP-2: Thiếu transparency làm mất accountability — vi phạm quyền cơ bản</strong><br><br>
        <strong>[A]</strong> Khi quyết định thay đổi cuộc sống của một người được đưa ra bởi một hệ thống mà người đó không thể hiểu, phản đối, hoặc yêu cầu giải thích, đó là vi phạm nguyên tắc due process cơ bản — không phụ thuộc vào việc quyết định đó "đúng" hay "sai".<br><br>
        <strong>[R]</strong> Giá trị nền tảng (Value premise): Trong một xã hội dân chủ, các quyết định quan trọng ảnh hưởng đến cá nhân phải có tính giải trình (accountability) và có thể phản đối (contestability). Đây không phải về kết quả — dù tốt hay xấu — mà về quy trình. Một công ty sử dụng AI "black box" không thể giải thích tại sao ứng viên bị từ chối, không thể đảm bảo không có discrimination, và không thể cho phép phản đối — vi phạm ba yêu cầu này đồng thời.<br><br>
        <strong>[E]</strong> Quyền về "Giải thích quyết định tự động" đã được EU GDPR Article 22 (2018) và EU AI Act (2024) thiết lập như một quyền cơ bản, bao gồm quyền được giải thích và quyền yêu cầu con người xem xét lại. Tuy nhiên, thực tế thực thi còn yếu — một nghiên cứu của Algorithm Watch (2023) cho thấy 73% công ty không thể cung cấp "meaningful explanation" cho quyết định AI tuyển dụng của họ, dù GDPR đã có hiệu lực 5 năm. Prohibition là cách duy nhất đảm bảo tuân thủ.<br><br>
        <strong>[I]</strong> Đây là lập luận về process value, không phải outcome value — điều này có nghĩa là ngay cả khi ĐL chứng minh AI tuyển dụng có kết quả tốt hơn trung bình, lập luận này vẫn đứng vững. Quyền được giải thích và phản đối không phụ thuộc vào việc quyết định "có lẽ đúng". Impact: mỗi năm hàng chục triệu người bị từ chối cơ hội việc làm mà không có lý do và không có con đường phản đối — đây là structural injustice không thể chấp nhận.
      </div>

      <div class="section-title">LO Speech — Đối Lập (7 phút)</div>

      <div class="example-block">
        <strong>Lập Luận ĐL-1: Baseline sai — con người tuyển dụng còn tệ hơn AI</strong><br><br>
        <strong>[A]</strong> Chính phủ so sánh AI tuyển dụng với một tiêu chuẩn lý tưởng không tồn tại — "tuyển dụng công bằng hoàn toàn". Trong thực tế, câu hỏi không phải là "AI có hoàn hảo không?" mà là "AI có tốt hơn con người không?" — và bằng chứng nghiêng về phía có.<br><br>
        <strong>[R]</strong> Bias của con người là hệ thống, ẩn tàng, không thể audit, và không bị trừng phạt. Một nhà tuyển dụng có bias về giới tính, chủng tộc, hay trường học không để lại dấu vết có thể kiểm tra được. AI, ngược lại, tạo ra audit trail — chúng ta chỉ biết Amazon AI có bias vì nó có thể được kiểm tra. Bằng cách cấm AI và quay lại tuyển dụng thuần con người, CP đang thay thế bias có thể phát hiện được bằng bias không thể phát hiện được.<br><br>
        <strong>[E]</strong> Nghiên cứu về audit tuyển dụng: Bertrand &amp; Mullainathan (2004, American Economic Review) gửi 5.000 hồ sơ giả với tên trắng và tên Mỹ-Phi để kiểm tra callback rate — tên "white-sounding" nhận được 50% nhiều callback hơn với hồ sơ giống hệt nhau. Đây là bias con người có hệ thống và không giảm bởi "good intentions". Ngược lại, Dastin (2018) — chính bài báo Reuters CP trích dẫn — lưu ý rằng Amazon phát hiện và hủy bỏ công cụ có bias: đây là hệ thống tự kiểm chứng và có thể sửa chữa. Không có cơ chế tương đương nào cho bias con người.<br><br>
        <strong>[I]</strong> Đây là counter-impact trực tiếp: nếu mục tiêu là giảm discrimination, cấm AI thực ra gây hại nhiều hơn lợi cho chính nhóm thiểu số mà CP muốn bảo vệ. Probability cao hơn, harm cụ thể hơn, không thể audit được — tệ hơn về mọi chiều weighing.
      </div>

      <div class="example-block">
        <strong>Lập Luận ĐL-2: Regulation thông minh, không phải prohibition — bảo vệ người lao động tốt hơn</strong><br><br>
        <strong>[A]</strong> Prohibition toàn diện sẽ đóng băng thị trường HR tech ở trạng thái hiện tại, ngăn chặn sự đổi mới tạo ra các công cụ công bằng hơn, trong khi regulation có mục tiêu có thể thúc đẩy ngành đi đúng hướng.<br><br>
        <strong>[R]</strong> Logic kinh tế của innovation: Nếu AI tuyển dụng bị cấm, vốn đầu tư vào HR tech sẽ chuyển sang các thị trường không bị cấm. Các công ty đang xây dựng "bias mitigation layers", "explainable AI" cho HR, và "diversity-optimized" screening sẽ không có lý do để tồn tại. Regulation cụ thể — như NYC Local Law 144 (2023) yêu cầu bias audit hàng năm cho AI tuyển dụng — tạo ra incentive để cải thiện mà không phá hủy ngành.<br><br>
        <strong>[E]</strong> NYC Local Law 144 (hiệu lực từ 7/2023) là luật đầu tiên trên thế giới bắt buộc bias audit độc lập cho AI tuyển dụng, với phạt từ $375–$1.500/ngày vi phạm. Đây là regulation, không phải prohibition — và nó đã tạo ra toàn bộ ngành "AI bias auditing" mới với các công ty như Pymetrics và HireQuotient chủ động cải thiện công cụ để vượt qua audit. Prohibition sẽ giết chết cả ngành này.<br><br>
        <strong>[I]</strong> Weighing: Prohibition → zero AI tools, quay về con người có bias không thể audit. Regulation → tiếp tục AI tools nhưng với bias audit, transparency requirements, và right to explanation. Hướng thứ hai bảo vệ người lao động tốt hơn trong thực tế. ĐL không bảo vệ status quo — chúng tôi bảo vệ regulated development như là con đường đúng đắn.
      </div>

      <div class="example-block">
        <strong>Lập Luận ĐL-3: Prohibition gây hại không cân xứng với SME và thị trường mới nổi</strong><br><br>
        <strong>[A]</strong> Cấm AI tuyển dụng thực ra bảo vệ lợi ích của những nhà tuyển dụng lớn, giàu có với team HR đông đủ, trong khi gây hại không cân xứng cho các SME và cho người tìm việc ở thị trường mà tiếp cận địa lý là rào cản.<br><br>
        <strong>[R]</strong> Kinh tế học của HR: Một công ty 10.000 nhân viên có thể tuyển 50 HR nhân viên để xử lý hồ sơ thủ công. Một startup 50 người không có lựa chọn đó — prohibition buộc họ hoặc không mở rộng hoặc tuyển dụng tệ hơn. Thêm vào đó, AI tuyển dụng cho phép người tìm việc ở địa phương xa nộp đơn vào công ty quốc tế mà không cần networking — prohibition làm tăng rào cản này.<br><br>
        <strong>[E]</strong> Theo SHRM (Society for Human Resource Management) 2023, chi phí tuyển dụng trung bình ở Mỹ là $4.700/vị trí — AI screening giảm con số này 40–60% cho SME. Trong bối cảnh thị trường lao động toàn cầu, AI đã cho phép ứng viên ở Đông Nam Á, Châu Phi, và Đông Âu tiếp cận việc làm từ xa với công ty phương Tây — prohibition có thể giảm cơ hội này đáng kể.<br><br>
        <strong>[I]</strong> Đây là distributional impact argument: CP nói "bảo vệ người lao động" nhưng thực ra chính sách của họ sẽ hại chính những người lao động ít đặc quyền nhất — những người ở thị trường nhỏ, SME, và thị trường mới nổi. Breadth và distributional equity là weighing criterion quan trọng.
      </div>

      <div class="chapter-title">Phần 2.C — Trao Đổi POI &amp; Phản Biện</div>

      <div class="section-title">POI Exchange — Trong bài phát biểu LO</div>

      <div class="example-block">
        <strong>[Bối cảnh:]</strong> LO đang phát triển lập luận về Amazon discovering và hủy bỏ AI bias — lập luận rằng đây là bằng chứng hệ thống tự kiểm chứng.<br><br>

        <strong>DPM (Chính phủ) đứng dậy:</strong> "POI?"<br><br>

        <strong>LO:</strong> "No." <em>[Từ chối — hợp lý trong đoạn đang xây dựng lập luận chính]</em><br><br>

        <strong>DPM:</strong> <em>[Đứng lại sau 30 giây]</em> "POI?"<br><br>

        <strong>LO:</strong> "I'll take it after this point." <em>[Điều chỉnh — cho phép POI ở điểm chuyển tiếp]</em><br><br>

        <strong>DPM:</strong> "Amazon phát hiện bias sau bao nhiêu năm sử dụng và bao nhiêu ứng viên đã bị loại oan? Điều này có chứng minh hệ thống 'tự kiểm chứng' nhanh chóng không?"<br><br>

        <strong>LO (phản hồi):</strong> "Amazon sử dụng công cụ từ 2014–2018 — bốn năm. Nhưng đây chính là lý do chúng tôi ủng hộ mandatory annual bias audit như NYC Law 144, không phải prohibition. Nếu có audit bắt buộc hàng năm, bias sẽ được phát hiện trong năm đầu tiên, không phải năm thứ tư. Câu hỏi của bạn chứng minh regulation hiệu quả hơn prohibition."<br><br>

        <strong>[Phân tích POI:]</strong> DPM đã thực hiện một "gotcha POI" rất thông minh — đặt timeline cụ thể để chỉ ra giới hạn của lập luận "tự kiểm chứng". Tuy nhiên, LO đã phản hồi xuất sắc bằng cách absorb POI và forward nó vào lập luận về regulation trong ĐL-2. Kỹ thuật "redirect to your policy proposal" rất hiệu quả khi alternative policy đã được set up tốt từ trước.
      </div>

      <div class="section-title">BARF Rebuttal — DLO phản bác CP-2 (Due Process)</div>

      <div class="example-block">
        <strong>[B — Bottom Line]</strong> Lập luận "due process" của Chính phủ có một lỗ hổng cơ bản: nó áp dụng tiêu chuẩn due process của khu vực công vào tuyển dụng tư nhân — một áp dụng sai pháp lý và thực tiễn.<br><br>

        <strong>[A — Argument Summary]</strong> CP lập luận rằng vì quyết định AI tuyển dụng ảnh hưởng lớn đến cuộc sống, người bị ảnh hưởng có quyền được giải thích và phản đối — và vì hầu hết công ty không cung cấp điều này, cần prohibition.<br><br>

        <strong>[R — Refutation]</strong> Ba phản bác: <em>Thứ nhất</em>, due process là nghĩa vụ của nhà nước với công dân — không phải của doanh nghiệp tư nhân với ứng viên. Không ai có "quyền được giải thích" khi nộp đơn vào McDonald's. Áp dụng tiêu chuẩn này vào tuyển dụng tư nhân là category error. <em>Thứ hai</em>, ngay cả nếu chúng ta muốn transparency hơn, prohibition không tạo ra transparency — nó xóa bỏ quy trình có thể audit được. Regulation như right-to-explanation under GDPR là con đường đúng đắn. <em>Thứ ba</em>, "73% công ty không cung cấp meaningful explanation" là lập luận cho <em>stronger enforcement of existing regulation</em>, không phải cho prohibition. Nếu GDPR không được thực thi tốt, sửa enforcement — đừng cấm technology.<br><br>

        <strong>[F — Final Impact]</strong> Khi bạn tách bỏ áp dụng sai pháp lý và nhìn vào thực chất, lập luận CP-2 thực ra là lập luận ủng hộ regulation chặt chẽ hơn — không phải prohibition. Đối lập đã nói điều đó từ đầu. Đây không phải clash giữa hai phía khác nhau mà là một phía cố ý tạo ra false clash.
      </div>

      <div class="section-title">Phân Tích Clash</div>

        <li><strong>Clash chính — Value Clash về Công Bằng (Mô-đun IV.2 — Value Clash):</strong> Cả hai bên đều muốn "công bằng cho người lao động" nhưng định nghĩa khác nhau: CP định nghĩa công bằng là không có discriminatory screening; ĐL định nghĩa công bằng là access không bị cản trở và accountability có thể audit. Đây là deep value clash quan trọng nhất trong trận — và cũng là nơi cả hai bên yếu nhất.</li>
        <li><strong>Clash thứ cấp — Policy Design Clash:</strong> Prohibition vs. regulation. ĐL thắng rõ ràng ở chiều này vì đề xuất alternative cụ thể với precedent (NYC Law 144) trong khi CP chỉ lập luận "regulation không đủ" mà không chứng minh "prohibition tốt hơn regulation cụ thể như thế nào".</li>
        <li><strong>Clash Factual về hiệu quả baseline:</strong> ĐL mạnh hơn với evidence Bertrand &amp; Mullainathan về bias con người; CP mạnh hơn với evidence về scale của AI harm. Không bên nào giải quyết clash này hoàn toàn.</li>

        <strong>Sai lầm 2:</strong> CP không exploit ĐL-3 về SME và thị trường mới nổi — lập luận này thực ra vulnerable vì nó chống lại người lao động yếu thế nhất. <em>Cách sửa (Mô-đun IV.2 — Clash Strategy):</em> "Đối lập muốn bảo vệ lợi nhuận của SME bằng cách hi sinh quyền chống discrimination của người lao động tại những công ty đó — đây là lựa chọn ưu tiên kinh doanh hơn quyền con người."

    const newTag = m.isNew ? ' <span class="new-badge">Mô-đun mới</span>' : '';
    div.innerHTML = `
      <div class="progress-bar">${progHTML}</div>
      <div class="module-header">
        <div class="module-num">${m.num} · <span class="badge ${m.badge}">${moduleLabels[i]}</span>${newTag}</div>
        <div class="module-title">${m.title}</div>
        <div class="module-desc">${m.desc}</div>
      </div>
      ${m.content}
      <div class="nav-row">
        <button class="nav-btn" onclick="prevModule(${i})" ${i === 0 ? 'disabled' : ''}>← Mô-đun trước</button>
        <button class="back-toc" onclick="showCover()">↑ Mục Lục</button>
        <button class="nav-btn" onclick="nextModule(${i})" ${i === modules.length - 1 ? 'disabled' : ''}>Mô-đun tiếp →</button>
      </div>
    `;
    modulesContainer.appendChild(div);
  });
}

function showCover() {
  coverToc.style.display = 'block';
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showModule(i) {
  coverToc.style.display = 'none';
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`module-${i}`).classList.add('active');
  document.getElementById(`toc-${i}`)?.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevModule(i) { if (i > 0) showModule(i - 1); }
function nextModule(i) { if (i < modules.length - 1) showModule(i + 1); }

buildTOC();
buildModules();
</script>
</body>
</html>
