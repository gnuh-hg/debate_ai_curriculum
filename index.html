<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --serif: 'Playfair Display', Georgia, serif;
    --body: 'Source Serif 4', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
    --ink: var(--color-text-primary, #1a1a1a);
    --ink2: var(--color-text-secondary, #4a4a4a);
    --ink3: var(--color-text-tertiary, #888);
    --bg: var(--color-background-primary, #fff);
    --bg2: var(--color-background-secondary, #f8f7f4);
    --bg3: var(--color-background-tertiary, #f0ede8);
    --border: var(--color-border-tertiary, #e0dbd2);
    --border2: var(--color-border-secondary, #c8c2b8);
    --accent: #185FA5;
    --accent-light: #E6F1FB;
    --gold: #BA7517;
    --gold-light: #FAEEDA;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
  }

  body { font-family: var(--body); color: var(--ink); line-height: 1.75; font-size: 16px; background: var(--bg); }

  .wrapper { max-width: 860px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  .cover {
    border-bottom: 0.5px solid var(--border2);
    padding: 3rem 0 2.5rem;
    margin-bottom: 3rem;
  }
  .cover-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }
  .cover-title {
    font-family: var(--serif);
    font-size: 2.6rem;
    font-weight: 600;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }
  .cover-subtitle {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink2);
    margin-bottom: 2rem;
  }
  .cover-meta {
    display: flex; gap: 2rem; flex-wrap: wrap;
    font-size: 13px; color: var(--ink2);
    border-top: 0.5px solid var(--border);
    padding-top: 1.2rem;
  }
  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-gold { background: var(--gold-light); color: var(--gold); }
  .badge-teal { background: var(--teal-light); color: var(--teal); }
  .badge-coral { background: var(--coral-light); color: var(--coral); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }

  .toc { margin-bottom: 3.5rem; }
  .toc-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 1rem;
  }
  .toc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
  }
  .toc-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    font-family: var(--body);
  }
  .toc-item:hover { border-color: var(--border2); background: var(--bg2); }
  .toc-item.active { border-color: var(--accent); background: var(--accent-light); }
  .toc-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink3);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .toc-item.active .toc-num { color: var(--accent); }
  .toc-label { font-size: 13px; color: var(--ink); line-height: 1.4; }
  .toc-item.active .toc-label { color: var(--accent); }

  .module { display: none; }
  .module.active { display: block; }

  .module-header {
    border-bottom: 0.5px solid var(--border2);
    padding-bottom: 1.5rem;
    margin-bottom: 2.5rem;
  }
  .module-num {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.5rem;
  }
  .module-title {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .module-desc {
    font-size: 15px;
    color: var(--ink2);
    font-style: italic;
    font-family: var(--serif);
  }

  .chapter-title {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--ink);
    margin: 2.5rem 0 0.8rem;
    padding-bottom: 0.4rem;
    border-bottom: 0.5px solid var(--border);
  }
  .section-title {
    font-family: var(--serif);
    font-size: 1.05rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin: 1.8rem 0 0.6rem;
  }
  p { margin-bottom: 1rem; font-size: 15px; }
  p:last-child { margin-bottom: 0; }

  .callout {
    border-left: 3px solid var(--accent);
    background: var(--accent-light);
    padding: 1rem 1.2rem;
    border-radius: 0 6px 6px 0;
    margin: 1.5rem 0;
  }
  .callout-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .callout p { font-size: 14px; color: var(--ink); margin: 0; }
  .callout-gold { border-left-color: var(--gold); background: var(--gold-light); }
  .callout-gold .callout-label { color: var(--gold); }
  .callout-teal { border-left-color: var(--teal); background: var(--teal-light); }
  .callout-teal .callout-label { color: var(--teal); }
  .callout-coral { border-left-color: var(--coral); background: var(--coral-light); }
  .callout-coral .callout-label { color: var(--coral); }
  .callout-purple { border-left-color: var(--purple); background: var(--purple-light); }
  .callout-purple .callout-label { color: var(--purple); }

  .framework-box {
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    padding: 1.2rem 1.5rem;
    margin: 1.5rem 0;
    background: var(--bg2);
  }
  .framework-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 0.8rem;
  }
  .framework-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 0.5rem;
  }
  .framework-cell {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 0.7rem 0.8rem;
    font-size: 13px;
  }
  .framework-cell strong {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 3px;
    font-weight: 400;
  }

  .example-block {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    margin: 1.2rem 0;
    font-size: 14px;
    font-style: italic;
    color: var(--ink2);
  }
  .example-block em { color: var(--ink); font-style: normal; font-weight: 500; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin: 1.2rem 0;
  }
  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    padding: 8px 10px;
    border-bottom: 0.5px solid var(--border2);
    text-align: left;
    font-weight: 400;
  }
  td {
    padding: 8px 10px;
    border-bottom: 0.5px solid var(--border);
    vertical-align: top;
    color: var(--ink);
    line-height: 1.5;
  }
  tr:last-child td { border-bottom: none; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
  }
  .nav-btn {
    font-family: var(--body);
    font-size: 13px;
    color: var(--ink2);
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--bg2); color: var(--ink); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .back-toc {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px 0;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: all 0.15s;
  }
  .back-toc:hover { color: var(--ink2); text-decoration-color: var(--ink3); }

  .progress-bar { display: flex; gap: 3px; margin-bottom: 2rem; }
  .progress-seg { height: 3px; flex: 1; background: var(--border2); border-radius: 2px; transition: background 0.3s; }
  .progress-seg.done { background: var(--accent); }

  .glossary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
    margin: 1.2rem 0;
  }
  .glossary-item {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    font-size: 13.5px;
  }
  .glossary-term {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  ul.content-list { padding-left: 1.4rem; margin: 0.8rem 0 1rem; }
  ul.content-list li { font-size: 15px; margin-bottom: 0.5rem; }
  ul.content-list li strong { color: var(--ink); }
</style>
</head>
<body>
<div class="wrapper">
  <div id="cover-toc">
    <div class="cover">
      <div class="cover-eyebrow">Tài Liệu Giáo Dục · Tranh Luận Cạnh Tranh</div>
      <div class="cover-title">Nền Tảng Tranh Luận<br>trong Kỷ Nguyên Trí Tuệ Nhân Tạo</div>
      <div class="cover-subtitle">Chương Trình Giảng Dạy Toàn Diện Dành Cho Người Mới Tham Dự Thi</div>
      <div class="cover-meta">
        <span><span class="badge badge-blue">8 Mô-đun</span></span>
        <span><span class="badge badge-gold">Giáo Trình Đầy Đủ</span></span>
        <span><span class="badge badge-teal">Người Mới → Thi Đấu</span></span>
        <span><span class="badge badge-purple">Đạo Đức AI · Chính Sách · Công Nghệ</span></span>
      </div>
    </div>
    <div class="toc">
      <div class="toc-title">Mục Lục</div>
      <div class="toc-grid" id="toc-grid"></div>
    </div>
  </div>
  <div id="modules-container"></div>
</div>

<script>
const modules = [
  {
    num: "Mô-đun I",
    title: "Triết Học và Kiến Trúc Lập Luận",
    desc: "Nền tảng bản thể luận, gánh nặng chứng minh, logic hình thức, cấu trúc bài, quyền tạo chính sách và khung lập luận.",
    badge: "badge-blue",
    content: `
      <div class="chapter-title">1.1 Bản Thể Luận của Tranh Luận (Ontology of Debate)</div>
      <p>Tranh luận cạnh tranh không chỉ là một hoạt động trình bày ý kiến. Về bản chất, nó là một hệ thống nhận thức luận có cấu trúc — một phương thức kiểm tra sự thật thông qua đối thoại đối kháng có kiểm soát. Trước khi học bất kỳ kỹ năng tranh luận cụ thể nào, người học cần nắm vững triết lý nền tảng của bộ môn này.</p>
      <p>Tranh luận xuất phát từ tiền đề rằng sự thật và chính sách tốt không thể được xác định bởi một cá nhân đơn lẻ mà phải được kiểm định qua quá trình phản biện. Mô hình này kế thừa phương pháp Socratic — dùng câu hỏi và phản bác để lọc bỏ lập luận yếu, giữ lại lập luận mạnh. Trong môi trường thi đấu, ban giám khảo đóng vai trò là đại diện của "công chúng lý trí" (reasonable audience): họ sẽ ủng hộ bên nào thuyết phục được họ tốt hơn dựa trên logic, bằng chứng và lập luận.</p>
      <div class="callout">
        <div class="callout-label">Nguyên Tắc Nền Tảng</div>
        <p>Nhiệm vụ của người tranh luận không phải là "chiến thắng bằng mọi giá" mà là <strong>thực thi nghĩa vụ lập luận</strong> — chứng minh lập trường của mình và bác bỏ lập trường đối lập một cách có hệ thống, trung thực và logic.</p>
      </div>

      <div class="section-title">Vai trò của Nghị đề (Motion)</div>
      <p>Mọi cuộc tranh luận bắt đầu bằng một <strong>nghị đề</strong> — một tuyên bố chính sách hoặc quan điểm cụ thể mà các đội sẽ bảo vệ hoặc phản đối. Nghị đề xác định phạm vi tranh luận, giới hạn những lập luận nào là phù hợp và không phù hợp. Ví dụ: <em>"Hội đồng này tin rằng các chính phủ nên quy định các hệ thống trí tuệ nhân tạo có thể gây rủi ro hiện hữu."</em> Nghị đề này thiết lập rằng cuộc tranh luận xoay quanh <em>vai trò của chính phủ</em> trong <em>quy định AI rủi ro cao</em> — không phải về AI nói chung.</p>

      <div class="chapter-title">1.2 Gánh Nặng Chứng Minh (Burden of Proof)</div>
      <p>Gánh nặng chứng minh là nghĩa vụ của một bên phải cung cấp đủ bằng chứng và lập luận để hỗ trợ tuyên bố của mình. Đây là một trong những khái niệm quan trọng nhất trong tranh luận, thường bị người mới bỏ qua.</p>
      <p>Trong hầu hết các thể thức tranh luận, <strong>bên Chính phủ (Government/Proposition)</strong> — bên ủng hộ nghị đề — mang gánh nặng chứng minh chính. Điều này có nghĩa là họ phải chứng minh nghị đề là đúng hoặc tốt hơn hiện trạng. Nếu bên Chính phủ không hoàn thành gánh nặng này, bên Đối lập (Opposition) không cần phải chứng minh bất cứ điều gì — chỉ cần cho thấy bên Chính phủ đã thất bại là đủ.</p>
      <div class="framework-box">
        <div class="framework-title">Phân Loại Gánh Nặng Chứng Minh</div>
        <div class="framework-row">
          <div class="framework-cell"><strong>Burden of Proof</strong>Nghĩa vụ cung cấp bằng chứng hỗ trợ tuyên bố của mình</div>
          <div class="framework-cell"><strong>Burden of Rebuttal</strong>Nghĩa vụ phản biện lập luận đối lập sau khi đã được đưa ra</div>
          <div class="framework-cell"><strong>Burden of Rejoinder</strong>Nghĩa vụ phản hồi lại phản biện của đối phương</div>
        </div>
      </div>
      <p>Nguyên tắc quan trọng: <em>Người đưa ra tuyên bố phải chứng minh tuyên bố đó</em> (He who asserts must prove). Nếu bạn nói "AI sẽ gây ra thất nghiệp hàng loạt," bạn phải cung cấp lý lẽ và bằng chứng — đối thủ không có nghĩa vụ chứng minh điều ngược lại cho đến khi bạn làm như vậy.</p>

      <div class="chapter-title">1.3 Logic Hình Thức và Lập Luận Hợp Lệ</div>
      <p>Logic hình thức là nền tảng của mọi lập luận tốt. Có hai cấu trúc logic chính mà người tranh luận cần nắm vững:</p>
      <div class="section-title">Diễn dịch (Deductive Reasoning)</div>
      <p>Lập luận diễn dịch đi từ tiền đề chung đến kết luận cụ thể. Nếu tiền đề là đúng và cấu trúc logic hợp lệ, kết luận tất yếu phải đúng. Ví dụ kinh điển là tam đoạn luận (syllogism): <em>Mọi công nghệ có thể bị lạm dụng (P1); AI là công nghệ (P2); Vậy AI có thể bị lạm dụng (C).</em></p>
      <div class="section-title">Quy nạp (Inductive Reasoning)</div>
      <p>Lập luận quy nạp đi từ các trường hợp cụ thể đến kết luận chung. Không giống diễn dịch, kết luận quy nạp chỉ có xác suất đúng, không tất yếu đúng. Ví dụ: <em>Các hệ thống AI nhận diện khuôn mặt ở Trung Quốc, Nga và Mỹ đều đã có vi phạm quyền riêng tư → Vậy AI nhận diện khuôn mặt có xu hướng gây nguy hại cho quyền riêng tư.</em></p>
      <div class="callout callout-gold">
        <div class="callout-label">Lưu Ý Quan Trọng</div>
        <p>Một lập luận có thể <strong>hợp lệ về mặt hình thức</strong> (cấu trúc đúng) nhưng <strong>sai về mặt thực tế</strong> (tiền đề sai). Người tranh luận giỏi phải tấn công cả hai chiều: tấn công cấu trúc logic VÀ tính xác thực của tiền đề.</p>
      </div>

      <div class="chapter-title">1.4 Cấu Trúc Bài Tranh Luận (Case Structure)</div>
      <p>Một bài tranh luận được tổ chức tốt bao gồm các thành phần sau, theo thứ tự:</p>
      <ul class="content-list">
        <li><strong>Định nghĩa (Definitions):</strong> Làm rõ các thuật ngữ trọng yếu trong nghị đề. Ai là "chính phủ"? "AI rủi ro cao" bao gồm những gì? Bên đưa ra định nghĩa chiếm lợi thế lớn vì họ kiểm soát phạm vi tranh luận.</li>
        <li><strong>Tuyên bố lập trường (Model/Stance):</strong> Mô tả ngắn gọn những gì bên bạn đề xuất hoặc phản đối, và theo cơ chế nào.</li>
        <li><strong>Các luận điểm (Arguments):</strong> Thường từ 2–3 luận điểm chính, mỗi luận điểm được xây dựng theo cấu trúc AREI (xem Mô-đun II).</li>
        <li><strong>Tóm tắt (Summary):</strong> Khẳng định lại lập trường và lý do tại sao bên bạn đã thắng cuộc tranh luận.</li>
      </ul>

      <div class="chapter-title">1.5 Fiat — Quyền Tạo Chính Sách</div>

      <p>Amazon's Rekognition — phần mềm nhận diện khuôn mặt thương mại — được ACLU thử nghiệm năm 2018 và xác định sai 28 thành viên Quốc hội Mỹ là tội phạm, với tỷ lệ sai cao hơn đáng kể đối với người da màu. Trường hợp này minh họa rõ nguy cơ của AI thiên kiến trong bối cảnh thực thi pháp luật.</p>
      <div class="section-title">OpenAI và Câu Hỏi Quản Trị Nội Bộ</div>
      <p>Cuộc khủng hoảng quản trị nội bộ của OpenAI năm 2023 — khi Hội đồng Quản trị bãi miễn CEO Sam Altman rồi sau đó phải mời ông trở lại — phơi bày căng thẳng cơ bản giữa sứ mệnh phi lợi nhuận ("an toàn AI vì nhân loại") và áp lực thương mại từ nhà đầu tư. Đây là ví dụ điển hình cho tranh luận về cấu trúc quản trị doanh nghiệp AI.</p>
      <div class="section-title">DeepMind AlphaFold — AI Làm Khoa Học</div>
      <p>AlphaFold của Google DeepMind đã giải quyết bài toán protein folding tồn tại 50 năm, dự đoán cấu trúc của hơn 200 triệu protein. Đây là bằng chứng mạnh nhất cho tiềm năng tích cực của AI trong khoa học và y học, thường được sử dụng để counterbalance các lập luận về rủi ro AI.</p>

      <div class="chapter-title">8.4 Chuẩn Mực Kỹ Thuật và Điểm Chuẩn (Technical Benchmarks)</div>
      <p>Trong tranh luận về AI, hiểu biết các điểm chuẩn kỹ thuật giúp người tranh luận tránh các tuyên bố sai lệch về khả năng AI và xây dựng lập luận dựa trên thực tế kỹ thuật.</p>
      <div class="glossary-grid">
        <div class="glossary-item"><div class="glossary-term">Turing Test</div>Bài kiểm tra truyền thống về trí thông minh AI — một máy có thể khiến người kiểm tra không phân biệt được với người thật. Không còn là tiêu chuẩn đủ với các LLM hiện đại nhưng vẫn quan trọng về mặt lịch sử.</div>
        <div class="glossary-item"><div class="glossary-term">MMLU Benchmark</div>Đánh giá kiến thức đa ngành của LLMs (từ luật đến y học đến toán học). GPT-4 đạt ~87%, vượt trung bình con người trên nhiều lĩnh vực.</div>
        <div class="glossary-item"><div class="glossary-term">Frontier AI</div>Thuật ngữ chỉ các mô hình AI mạnh nhất hiện tại — đặc biệt quan trọng trong tranh luận chính sách vì EU AI Act và Bletchley Declaration tập trung vào frontier AI.</div>
        <div class="glossary-item"><div class="glossary-term">Existential Risk (x-risk)</div>Rủi ro gây nguy hiểm cho sự tồn tại của nền văn minh con người. Nhiều nhà nghiên cứu AI an toàn coi AGI không được kiểm soát là x-risk. Đây là cơ sở cho các lập luận về biện pháp phòng ngừa quyết liệt.</div>
        <div class="glossary-item"><div class="glossary-term">AI Safety vs. AI Ethics</div>AI Safety tập trung vào rủi ro dài hạn (AGI, alignment); AI Ethics tập trung vào thiên kiến, quyền riêng tư, và tác hại hiện tại. Trong tranh luận, cần phân biệt rõ để tránh nhầm lẫn hai loại lập luận.</div>
        <div class="glossary-item"><div class="glossary-term">Compute Threshold</div>Mức độ tính toán (computing power) được dùng làm proxy để xác định "AI rủi ro cao." EU AI Act và một số đề xuất chính sách Mỹ sử dụng compute threshold làm tiêu chí quy định.</div>
      </div>
      <div class="callout callout-gold">
        <div class="callout-label">Lời Khuyên Cuối Cùng</div>
        <p>Kiến thức kỹ thuật về AI là lợi thế cạnh tranh quan trọng — nhưng chỉ khi được dịch sang <strong>ngôn ngữ chính sách và đạo đức</strong> mà giám khảo và khán giả có thể đánh giá. Người tranh luận giỏi nhất về AI không chỉ biết công nghệ mà còn biết cách kết nối nó với các giá trị nhân bản phổ quát.</p>
      </div>
    `
  }
];

const tocGrid = document.getElementById('toc-grid');
const modulesContainer = document.getElementById('modules-container');
const coverToc = document.getElementById('cover-toc');

function buildTOC() {
  modules.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'toc-item';
    btn.id = `toc-${i}`;
    btn.innerHTML = `<span class="toc-num">${String(i+1).padStart(2,'0')}</span><span class="toc-label">${m.title}</span>`;
    btn.onclick = () => showModule(i);
    tocGrid.appendChild(btn);
  });
}

function buildModules() {
  modules.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'module';
    div.id = `module-${i}`;
    const progHTML = modules.map((_, j) =>
      `<div class="progress-seg${j <= i ? ' done' : ''}"></div>`
    ).join('');
    div.innerHTML = `
      <div class="progress-bar">${progHTML}</div>
      <div class="module-header">
        <div class="module-num">${m.num} · <span class="badge ${m.badge}">${['Triết Học','Xây Dựng','Phản Biện','Sàn Đấu','Hùng Biện','Nội Dung AI','Chuẩn Bị','Bằng Chứng'][i]}</span></div>
        <div class="module-title">${m.title}</div>
        <div class="module-desc">${m.desc}</div>
      </div>
      ${m.content}
      <div class="nav-row">
        <button class="nav-btn" onclick="prevModule(${i})" ${i === 0 ? 'disabled' : ''}>← Mô-đun trước</button>
        <button class="back-toc" onclick="showCover()">↑ Mục Lục</button>
        <button class="nav-btn" onclick="nextModule(${i})" ${i === modules.length - 1 ? 'disabled' : ''}>Mô-đun tiếp →</button>
      </div>
    `;
    modulesContainer.appendChild(div);
  });
}

function showCover() {
  coverToc.style.display = 'block';
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showModule(i) {
  coverToc.style.display = 'none';
  document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`module-${i}`).classList.add('active');
  document.getElementById(`toc-${i}`)?.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevModule(i) { if (i > 0) showModule(i - 1); }
function nextModule(i) { if (i < modules.length - 1) showModule(i + 1); }

buildTOC();
buildModules();
</script>
</body>
</html>
